<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0C0C0C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Mi Colonia">
<meta name="description" content="Portal comunitario con avisos, eventos, chat y directorio de vecinos">
<meta name="color-scheme" content="dark light">
<link rel="manifest" href="./manifest.json">
<title>Mi Colonia</title>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0C0C0C;--bg2:#141414;--bg3:#1C1C1C;--card:#181818;--bdr:#272727;
  --pri:#F5A000;--pri-d:#C07B00;--pri-x:rgba(245,160,0,.13);
  --grn:#0A1E10;--grn-b:#174726;--grn-t:#4ADE80;
  --txt:#F0F0F0;--txt2:#9CA3AF;--txt3:#5C6370;
  --red:#F87171;--red-b:rgba(248,113,113,.15);
  --nav:#111;--nh:62px;--r:14px;--rs:10px;
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left, 0px);
  --sar: env(safe-area-inset-right, 0px);
}
/* ─── TEMA CLARO ─── */
body.light{
  --bg:#F5F5F5;--bg2:#FFFFFF;--bg3:#EBEBEB;--card:#FFFFFF;--bdr:#D9D9D9;
  --txt:#111111;--txt2:#555555;--txt3:#888888;
  --nav:#FFFFFF;--grn:#D6F5E3;--grn-b:#A3D9B8;--grn-t:#1A7A42;
  --red-b:rgba(248,113,113,.12);
}
.light .msg-bub{background:#EBEBEB;border-color:#D9D9D9}
.light .mine .msg-bub{background:rgba(245,160,0,.15);border-color:rgba(245,160,0,.25)}
.light .otp-b,.light .auth-card{background:#FFFFFF;border-color:#D9D9D9}
.light .code-block{background:#EBEBEB}

/* ─── ANIMACIÓN MENSAJES CHAT ─── */
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg{display:flex;gap:8px;margin-bottom:.65rem;align-items:flex-end;animation:msgIn .22s ease}
.msg.no-anim{animation:none} /* mensajes ya visibles — sin re-animación al actualizar */
.msg.mine{flex-direction:row-reverse}

html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;max-width:480px;margin:0 auto;overflow-x:hidden;
  padding-left:var(--sal);padding-right:var(--sar)}

/* ─── HEADER ─── */
.hdr{background:var(--bg);border-bottom:1px solid var(--bdr);padding:calc(.75rem + var(--sat)) 1rem .75rem;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.hdr-l{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;border-radius:10px;background:var(--pri);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.logo-name{font-size:1.1rem;font-weight:800;color:var(--pri);letter-spacing:-.01em}
.hdr-r{display:flex;align-items:center;gap:8px}
.hbtn{width:34px;height:34px;border-radius:50%;border:none;background:transparent;cursor:pointer;font-size:1.15rem;display:flex;align-items:center;justify-content:center;position:relative}
.hbtn .dot{position:absolute;top:3px;right:3px;width:8px;height:8px;border-radius:50%;background:var(--red);border:2px solid var(--bg)}
.av-hdr{width:34px;height:34px;border-radius:50%;background:var(--pri-x);border:2px solid var(--pri);overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:800;color:var(--pri);flex-shrink:0;background-size:cover;background-position:center}

/* ─── PAGE ─── */
.page{padding:1.25rem 1rem calc(var(--nh) + var(--sab) + 1.5rem);min-height:calc(100vh - 56px - var(--nh))}
.pg-title{font-size:1.55rem;font-weight:900;margin-bottom:2px;letter-spacing:-.02em}
.pg-sub{font-size:.8rem;color:var(--txt2);margin-bottom:1.2rem;font-weight:500}

/* ─── AUTH SCREEN ─── */
.auth-scr{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;background:var(--bg)}
.auth-logo{text-align:center;margin-bottom:2rem}
.auth-ico-lg{width:80px;height:80px;border-radius:24px;background:var(--pri);display:flex;align-items:center;justify-content:center;font-size:2.4rem;margin:0 auto 1rem}
.auth-app-nm{font-size:1.75rem;font-weight:900;color:var(--pri);letter-spacing:-.02em}
.auth-tag{font-size:.88rem;color:var(--txt2);margin-top:5px;font-weight:500}
.auth-card{width:100%;max-width:380px;background:var(--bg2);border:1px solid var(--bdr);border-radius:20px;padding:1.5rem 1.25rem}
.auth-tabs{display:grid;grid-template-columns:1fr 1fr;background:var(--bg3);border-radius:var(--rs);padding:3px;margin-bottom:1.25rem;gap:0}
.auth-tab{padding:.5rem;border-radius:8px;border:none;background:transparent;font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:700;color:var(--txt2);cursor:pointer}
.auth-tab.on{background:var(--pri);color:#000}
.mets{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:1.1rem}
.met{padding:.45rem;border:1px solid var(--bdr);border-radius:var(--rs);background:var(--bg3);font-family:'Outfit',sans-serif;font-size:.8rem;font-weight:600;color:var(--txt2);cursor:pointer}
.met.on{border-color:var(--pri);color:var(--pri);background:var(--pri-x)}
.foto-up{display:flex;align-items:center;gap:1rem;margin-bottom:1.1rem;cursor:pointer}
.foto-circle{width:64px;height:64px;border-radius:50%;background:var(--bg3);border:2px dashed var(--bdr);display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;overflow:hidden;background-size:cover;background-position:center}
.foto-lbl{font-size:.85rem;font-weight:600;color:var(--pri);line-height:1.5}
.otp-row{display:flex;gap:8px;justify-content:center;margin-bottom:1.25rem}
.otp-b{width:44px;height:54px;border:2px solid var(--bdr);border-radius:var(--rs);background:var(--bg3);color:var(--txt);font-family:'Outfit',sans-serif;font-size:1.4rem;font-weight:800;text-align:center;-moz-appearance:textfield}
.otp-b::-webkit-outer-spin-button,.otp-b::-webkit-inner-spin-button{-webkit-appearance:none}
.otp-b:focus{outline:none;border-color:var(--pri)}
.setup-scr{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;text-align:center;background:var(--bg)}
.code-block{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rs);padding:.85rem 1rem;font-family:monospace;font-size:.78rem;color:var(--pri);text-align:left;line-height:1.7;margin:1rem 0;white-space:pre-wrap;word-break:break-all}

/* ─── PERFIL SCREEN ─── */
.pscr{min-height:100vh;background:var(--bg);padding-bottom:2rem}
.pscr-hdr{background:var(--bg);border-bottom:1px solid var(--bdr);padding:.85rem 1rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:50}
.pscr-body{padding:0 1rem 2rem}
.p-cover{height:120px;background:var(--bg3);border-bottom:1px solid var(--bdr);position:relative}
.p-av-wrap{position:absolute;bottom:-44px;left:1.25rem}
.p-av{width:88px;height:88px;border-radius:50%;border:4px solid var(--bg);background:var(--pri-x);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:2rem;background-size:cover;background-position:center;cursor:pointer;position:relative}
.p-av-edit{position:absolute;bottom:2px;right:2px;width:24px;height:24px;border-radius:50%;background:var(--pri);display:flex;align-items:center;justify-content:center;font-size:.75rem}
.p-info{padding:3.5rem 1.25rem 1rem}
.p-name{font-size:1.4rem;font-weight:900;letter-spacing:-.02em}
.p-sub{font-size:.82rem;color:var(--txt2);font-weight:500;margin-top:3px;display:flex;align-items:center;gap:6px}
.rol-chip{display:inline-flex;padding:2px 9px;border-radius:100px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.rol-admin{background:rgba(245,160,0,.2);color:var(--pri)}
.rol-vecino{background:var(--bg3);color:var(--txt2)}
.p-row{display:flex;align-items:center;gap:.85rem;padding:.85rem;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:.65rem}
.p-row-ico{font-size:1.15rem;flex-shrink:0}
.p-row strong{display:block;font-size:.88rem;font-weight:700}
.p-row span{font-size:.75rem;color:var(--txt2)}

/* ─── BOTTOM NAV ─── */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:calc(var(--nh) + var(--sab));padding-bottom:var(--sab);background:var(--nav);border-top:1px solid var(--bdr);display:flex;align-items:stretch;z-index:100}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;cursor:pointer;padding:5px 2px;border-top:2px solid transparent}
.ni.on{border-top-color:var(--pri)}
.ni-ico{font-size:1.1rem;line-height:1;width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center}
.ni.on .ni-ico{background:var(--pri-x)}
.ni-lbl{font-family:'Outfit',sans-serif;font-size:.58rem;font-weight:600;color:var(--txt3);white-space:nowrap}
.ni.on .ni-lbl{color:var(--pri)}

/* ─── FAB ─── */
.fab{position:fixed;bottom:calc(var(--nh) + var(--sab) + .85rem);right:1rem;width:52px;height:52px;border-radius:50%;background:var(--pri);color:#000;border:none;font-size:1.35rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:99;box-shadow:0 4px 18px rgba(245,160,0,.35)}
.fab:active{transform:scale(.92)}

/* ─── PWA INSTALL BUTTON ─── */
.pwa-install-btn{
  position:fixed;
  bottom:calc(var(--nh) + var(--sab) + .85rem);
  left:1rem;
  display:flex;align-items:center;gap:8px;
  padding:.58rem 1rem .58rem .75rem;
  background:#1A1A1A;
  border:1.5px solid var(--pri);
  border-radius:100px;
  color:var(--txt);
  font-family:'Outfit',sans-serif;
  font-size:.82rem;font-weight:700;
  cursor:pointer;
  z-index:98;
  box-shadow:0 4px 18px rgba(0,0,0,.45);
  transition:transform .18s,opacity .18s;
  white-space:nowrap;
}
.pwa-install-btn:active{transform:scale(.93)}
.pwa-install-btn .pwa-ico{
  width:28px;height:28px;border-radius:50%;
  background:var(--pri);
  display:flex;align-items:center;justify-content:center;
  font-size:.88rem;flex-shrink:0;
}
.pwa-install-btn .pwa-close{
  width:20px;height:20px;border-radius:50%;
  background:var(--bg3);border:none;
  color:var(--txt3);font-size:.65rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  margin-left:2px;flex-shrink:0;
  font-family:'Outfit',sans-serif;
  line-height:1;
}
body.light .pwa-install-btn{background:#fff}

/* ─── CARDS ─── */
.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;cursor:pointer;margin-bottom:.7rem}
.card:active{opacity:.8}
.card-body{padding:.9rem 1rem .75rem}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:100px;font-size:.68rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:.5rem}
.b-urg{background:var(--red-b);color:var(--red)}
.b-avi{background:rgba(251,191,36,.12);color:#FCD34D}
.b-com{background:rgba(74,222,128,.12);color:#86EFAC}
.b-pre{background:rgba(96,165,250,.12);color:#93C5FD}
.card-title{font-size:.98rem;font-weight:700;line-height:1.35;margin-bottom:.38rem}
.card-excerpt{font-size:.83rem;color:var(--txt2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{padding:.48rem 1rem;border-top:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;font-size:.73rem;color:var(--txt3);font-weight:500}
.card-meta-l{display:flex;align-items:center;gap:6px}
.mini-av{width:22px;height:22px;border-radius:50%;background:var(--pri-x);background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:800;color:var(--pri);flex-shrink:0}
.card-poll{padding:.65rem 1rem;border-top:1px solid var(--bdr)}
.poll-row{margin-bottom:.4rem}
.poll-lbl{display:flex;justify-content:space-between;font-size:.75rem;font-weight:600;margin-bottom:3px;color:var(--txt2)}
.poll-track{height:6px;border-radius:100px;background:var(--bg3);overflow:hidden}
.poll-fill{height:100%;border-radius:100px;background:#60A5FA;transition:width .5s}
.poll-tot{font-size:.7rem;color:var(--txt3);font-weight:500;margin-top:.35rem}

/* ─── EVENTO CARDS ─── */
.evt-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:.7rem;cursor:pointer}
.evt-card:active{opacity:.8}
.evt-card-body{display:flex;gap:.85rem;align-items:flex-start;padding:.9rem 1rem}
.evt-cal{background:var(--pri);border-radius:10px;padding:.35rem .6rem;text-align:center;min-width:50px;flex-shrink:0}
.evt-day{font-size:1.3rem;font-weight:900;color:#000;line-height:1}
.evt-mon{font-size:.6rem;font-weight:700;color:#000;text-transform:uppercase}
.evt-info{flex:1;min-width:0}
.evt-title{font-size:.95rem;font-weight:700;margin-bottom:3px}
.evt-when{font-size:.78rem;color:var(--txt2);font-weight:500}
.evt-desc{font-size:.8rem;color:var(--txt2);margin-top:4px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* ─── VECINO CARDS ─── */
.vec-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:.85rem 1rem;margin-bottom:.7rem;display:flex;gap:.85rem;align-items:center}
.vec-av{width:44px;height:44px;border-radius:50%;background:var(--pri-x);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}

/* ─── CHAT ─── */
.chat-list{padding-bottom:calc(var(--nh) + 4.5rem)}
.msg-av{width:30px;height:30px;border-radius:50%;background:var(--pri-x);background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:800;color:var(--pri);flex-shrink:0}
.msg-bub{background:var(--card);border:1px solid var(--bdr);border-radius:14px 14px 14px 4px;padding:.6rem .85rem;max-width:78%}
.mine .msg-bub{background:var(--pri-x);border-color:rgba(245,160,0,.2);border-radius:14px 14px 4px 14px}
.msg-nick{font-size:.68rem;font-weight:700;color:var(--pri);margin-bottom:2px}
.msg-txt{font-size:.85rem;line-height:1.5}
.msg-ts{font-size:.65rem;color:var(--txt3);margin-top:3px;text-align:right}
.chat-bar{position:fixed;bottom:calc(var(--nh) + var(--sab));left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:.55rem .85rem;background:var(--bg2);border-top:1px solid var(--bdr);display:flex;gap:8px;align-items:center;z-index:90}
.chat-bar input{flex:1;padding:.5rem .85rem;border-radius:100px}
.chat-send{width:38px;height:38px;border-radius:50%;background:var(--pri);color:#000;border:none;cursor:pointer;font-size:.95rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chat-counter{font-size:.68rem;font-weight:800;color:var(--txt3);min-width:24px;text-align:center;flex-shrink:0;transition:color .2s;line-height:1}
.chat-counter.warn{color:#FCD34D}
.chat-counter.over{color:var(--red)}

/* ─── MAPA ─── */
.mapa-frame{width:100%;height:250px;border-radius:var(--r);border:1px solid var(--bdr);overflow:hidden;margin-bottom:1rem;background:var(--bg2);display:flex;align-items:center;justify-content:center}
.mapa-lnk{display:flex;align-items:center;gap:.85rem;padding:.85rem 1rem;background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:.65rem;cursor:pointer;text-decoration:none;color:var(--txt)}
.mapa-lnk strong{display:block;font-size:.9rem;font-weight:700}
.mapa-lnk span{font-size:.75rem;color:var(--txt2)}

/* ─── FILTER TABS ─── */
.ftabs{display:flex;gap:7px;margin-bottom:1rem;overflow-x:auto;scrollbar-width:none}
.ftabs::-webkit-scrollbar{display:none}
.ftab{flex-shrink:0;padding:.33rem .85rem;border-radius:100px;border:1px solid var(--bdr);background:transparent;font-family:'Outfit',sans-serif;font-size:.78rem;font-weight:600;color:var(--txt2);cursor:pointer;white-space:nowrap}
.ftab.on{background:var(--pri);border-color:var(--pri);color:#000}

/* ─── PERM CARD ─── */
.perm-card{background:var(--grn);border:1px solid var(--grn-b);border-radius:var(--r);padding:1rem 1.1rem;margin-bottom:1.25rem}
.perm-row{display:flex;align-items:center;gap:8px;font-size:.88rem;font-weight:600;color:var(--grn-t);margin-bottom:.75rem}
.btn-pri{display:inline-flex;align-items:center;gap:6px;padding:.52rem 1.1rem;background:var(--pri);color:#000;border:none;border-radius:var(--rs);font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer}

/* ─── STAT GRID ─── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:1.2rem}
.stat-box{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:.85rem 1rem;text-align:center}
.stat-n{font-size:1.7rem;font-weight:900;color:var(--pri)}
.stat-lb{font-size:.72rem;color:var(--txt2);font-weight:600;margin-top:2px}
.sec-ttl{font-size:.7rem;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;margin:.9rem 0 .5rem}

/* ─── EMPTY ─── */
.empty{text-align:center;padding:3.5rem 1rem}
.empty-ico{font-size:2.8rem;margin-bottom:.75rem}
.empty-txt{color:var(--txt2);font-size:.88rem;line-height:1.7}

/* ─── OVERLAYS ─── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:flex;flex-direction:column;justify-content:flex-end}
.sheet{background:var(--bg2);border-radius:20px 20px 0 0;padding:1.4rem 1rem 2rem;max-height:93vh;overflow-y:auto}
.sh-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem}
.sh-title{font-size:1.15rem;font-weight:800}
.xbtn{width:32px;height:32px;border-radius:50%;border:1px solid var(--bdr);background:var(--bg3);font-size:.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--txt2)}

/* ─── FORMS ─── */
.fg{margin-bottom:.95rem}
.lbl{display:block;font-size:.72rem;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.35rem}
input[type=text],input[type=password],input[type=email],input[type=tel],input[type=datetime-local],textarea,select{width:100%;padding:.65rem .9rem;border:1px solid var(--bdr);border-radius:var(--rs);background:var(--bg3);color:var(--txt);font-family:'Outfit',sans-serif;font-size:.9rem;-webkit-appearance:none;color-scheme:dark}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--pri)}
textarea{min-height:100px;resize:vertical}
.btn-full{width:100%;padding:.78rem;background:var(--pri);color:#000;border:none;border-radius:var(--rs);font-family:'Outfit',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:.2rem}
.btn-full:active{opacity:.88}
.btn-full:disabled{opacity:.5;cursor:default}
.btn-out{width:100%;padding:.72rem;background:transparent;border:1px solid var(--bdr);color:var(--txt2);border-radius:var(--rs);font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;margin-top:.5rem}
.btn-danger{width:100%;padding:.72rem;background:transparent;border:1px solid var(--red);color:var(--red);border-radius:var(--rs);font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;margin-top:.5rem}
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:1rem}

function q(s) { return document.querySelector(s); }
function qA(s) { return document.querySelectorAll(s); }

/* Escapa caracteres HTML para prevenir XSS en todo contenido generado por usuarios */
function escHTML(s) {
  return (s||'').toString()
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}
/* Escapa y convierte saltos de línea a <br> */
function escNL(s) { return escHTML(s).replace(/\n/g,'<br>'); }


/* ── SHA-256 via Web Crypto API (para proteger el código de eventos) ── */
async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function ago(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const s = (Date.now() - d) / 1000;
  if (s < 60) return 'Ahora';
  if (s < 3600) return `Hace ${Math.floor(s/60)} min`;
  if (s < 86400) return `Hace ${Math.floor(s/3600)} h`;
  if (s < 172800) return 'Ayer';
  return d.toLocaleDateString('es-MX', { day: 'numeric', month: 'short' });
}
function fmtFecha(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);

  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);

function calMes(ts) { const d = ts?.toDate ? ts.toDate() : new Date(ts); return d.toLocaleDateString('es-MX', { month:'short' }); }

function toast(m, t=2800) {

/* Reemplaza confirm() nativo — funciona bien en iOS Safari PWA */
function confirmar(msg, { okLabel='Eliminar', okClass='', cancelLabel='Cancelar' } = {}) {
  return new Promise(resolve => {
    const ov = q('#cfm-ov');
    ov.style.display = 'flex';
    ov.innerHTML = `<div class="cfm-ov"><div class="cfm-box">
      <div class="cfm-msg">${msg}</div>
      <div class="cfm-btns">
        <button class="cfm-cancel" id="cfm-no">${cancelLabel}</button>
        <button class="cfm-ok ${okClass}" id="cfm-yes">${okLabel}</button>
      </div>
    </div></div>`;
    const close = val => { ov.style.display = 'none'; ov.innerHTML = ''; resolve(val); };
    q('#cfm-yes').addEventListener('click', () => close(true));
    q('#cfm-no').addEventListener('click',  () => close(false));
    ov.querySelector('.cfm-ov').addEventListener('click', e => { if (e.target === e.currentTarget) close(false); });
  });
}
function promptModal(msg, { placeholder='', valor='', okLabel='Enviar', cancelLabel='Cancelar', tipo='text' } = {}) {
  return new Promise(resolve => {
    const ov = q('#cfm-ov');
    ov.style.display = 'flex';
    ov.innerHTML = `<div class="cfm-ov"><div class="cfm-box">
      <div class="cfm-msg">${msg}</div>
      <input type="${tipo}" id="cfm-input" value="${escHTML(valor)}" placeholder="${escHTML(placeholder)}"
        autocomplete="${tipo==='email'?'email':'off'}"
        style="width:100%;margin-bottom:.9rem;padding:.6rem .85rem;border-radius:var(--rs);border:1px solid var(--bdr);background:var(--bg3);color:var(--txt);font-family:'Outfit',sans-serif;font-size:.88rem;outline:none;box-sizing:border-box">
      <div class="cfm-btns">
        <button class="cfm-cancel" id="cfm-no">${cancelLabel}</button>
        <button class="cfm-ok pri" id="cfm-yes">${okLabel}</button>
      </div>
    </div></div>`;
    const inp = q('#cfm-input');
    const close = val => { ov.style.display='none'; ov.innerHTML=''; resolve(val); };
    inp?.focus(); inp?.select();
    q('#cfm-yes').addEventListener('click', () => close(inp?.value?.trim()||null));
    q('#cfm-no').addEventListener('click',  () => close(null));
    ov.querySelector('.cfm-ov').addEventListener('click', e => { if(e.target===e.currentTarget) close(null); });
    inp?.addEventListener('keypress', e => { if(e.key==='Enter'){ e.preventDefault(); close(inp.value.trim()||null); }});
  });
}

/* ══════════════════════════════════════════════════════
   ④ FOTO → base64 comprimida en Firestore (sin Storage)
   Comprime a 120×120px ≈ 3–6 KB → nítida en pantallas Retina, cabe en Firestore gratis
══════════════════════════════════════════════════════ */
function fotoABase64(file, maxPx=120, calidad=0.72) {
  return new Promise(res => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const lado = Math.min(img.width, img.height);
      const sx   = (img.width  - lado) / 2;
      const sy   = (img.height - lado) / 2;
      const c    = document.createElement('canvas');
      c.width = c.height = maxPx;
      c.getContext('2d').drawImage(img, sx, sy, lado, lado, 0, 0, maxPx, maxPx);
      URL.revokeObjectURL(url);
      res(c.toDataURL('image/jpeg', calidad)); // retorna data:image/jpeg;base64,...
    };
    img.src = url;
  });
}
async function subirFoto(uid, file) {
  // Convierte a base64 y lo guarda en el documento de usuario en Firestore
  // Resultado ≈ 6 KB por usuario — 1500 usuarios = ~9 MB (dentro del límite gratis de 1 GB)
  const base64 = await fotoABase64(file);
  await db.collection('users').doc(uid).update({ fotoUrl: base64 });
  return base64;
}

/* Compresión para fotos de publicaciones — respeta proporción, max 800px, ≈40-90KB */
function fotoNoticiaABase64(file, maxPx=800, calidad=0.65) {
  return new Promise(res => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const ratio = img.width / img.height;
      let w = img.width, h = img.height;
      if (w > maxPx || h > maxPx) {
        if (ratio >= 1) { w = maxPx; h = Math.round(maxPx / ratio); }
        else            { h = maxPx; w = Math.round(maxPx * ratio); }
      }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      res(c.toDataURL('image/jpeg', calidad));
    };
    img.src = url;
  });
}

/* ══════════════════════════════════════════════════════
   ⑥ FIRESTORE — tiempo real
══════════════════════════════════════════════════════ */
function suscribir() {
  // Evitar llamadas concurrentes
  if (S._suscribiendo) return;
  S._suscribiendo = true;

  S.unsubs.forEach(u => u()); S.unsubs = [];

  // Temporizador para agrupar renders simultáneos de varios listeners
  let renderTimer = null;
  const re = () => {
    if (S.det) return; // el detalle tiene su propia lógica
    clearTimeout(renderTimer);
    renderTimer = setTimeout(() => {
      // Si el tab activo tiene un contenedor de cards parcial, actualizar solo él
      // para no destruir inputs de búsqueda con foco
      const notsContainer = q('#nots-cards-container');
      const vecsContainer = q('#vecs-cards-container');
      if (notsContainer && S.tab === 'noticias') {
        notsContainer.innerHTML = renderNotsCards();
        bindCards();
      } else if (vecsContainer && S.tab === 'vecinos') {
        // Actualización parcial SOLO si el usuario está escribiendo en el buscador
        // (preserva el foco y el texto escrito). En cualquier otro caso, render
        // completo para que los contadores "Todos (N)" y "Mi calle (N)" sean correctos.
        const buscadorActivo = document.activeElement?.id === 'inp-busq-vec';
        if (buscadorActivo) {
          vecsContainer.innerHTML = renderVecsCards();
          bindCards();
        } else {
          render();
        }
      } else {
        render();
      }
    }, 40);
  };

  S.unsubs.push(
    db.collection('noticias').orderBy('fecha','desc').limit(30)
      .onSnapshot(snap => {
        // Notificaciones locales para avisos nuevos
        if (!S._firstLoad && Notification.permission === 'granted') {
          snap.docChanges()
            .filter(c => c.type === 'added')
            .map(c => ({id:c.doc.id,...c.doc.data()}))
            .filter(n => n.autorId !== S.user?.uid) // no notificar mis propios avisos
            .forEach(n => {
              try {
                const emoji = n.urgente ? '🔴' : n.tipo === 'pregunta' ? '❓' : n.tipo === 'comunicado' ? '📢' : '📌';
                new Notification(`${emoji} ${n.titulo}`, {
                  body: (n.texto||'').substring(0, 120),
                  icon: './icon.svg',
                  badge: './icon.svg',
                  tag: n.id,
                  data: { url: `#noticias/det/not/${n.id}` },
                });
              } catch(e) {}
            });
        }
        S.nots = snap.docs.map(d => ({id:d.id,...d.data()}))
          .filter(n => {
            // Filtrar noticias expiradas (si tienen expiresAt)
            if (!n.expiresAt) return true;
            const exp = n.expiresAt.toDate ? n.expiresAt.toDate() : new Date(n.expiresAt);
            return exp > new Date();
          });
        S.notLastDoc = snap.docs[snap.docs.length - 1] || null;
        S.notHayMas = snap.docs.length >= 30;
        S._firstLoad = false;
        if(S.tab==='noticias') re();
      })
  );
  S.unsubs.push(
    db.collection('eventos')
      .where('fecha', '>', firebase.firestore.Timestamp.fromDate(new Date(Date.now()-36e5)))
      .orderBy('fecha','asc').limit(30)
      .onSnapshot(snap => {
        S.evts = snap.docs.map(d=>({id:d.id,...d.data()}));
        if(S.tab==='eventos') re();
      })
  );
  S.unsubs.push(
    db.collection('chat').orderBy('timestamp','asc').limitToLast(50)
      .onSnapshot(snap => {
        const prevIds = new Set(S.chat.map(m => m.id));
        S.chat = snap.docs.map(d=>({id:d.id,...d.data()}));
        S.chatFirstDoc = snap.docs[0] || null;
        S.chatHayMas = snap.docs.length >= 50;

        // Notificar mensajes nuevos del chat cuando el usuario no está en el tab de chat
        if (Notification.permission === 'granted' && prevIds.size > 0) {
          snap.docChanges()
            .filter(c => c.type === 'added')
            .map(c => ({id:c.doc.id,...c.doc.data()}))
            .filter(m => !prevIds.has(m.id) && m.autorId !== S.user?.uid)
            .forEach(m => {
              if (S.tab === 'chat' && !document.hidden) return; // ya lo ve en pantalla
              const canal = m.canal && m.canal !== 'general' ? ` [${m.canal.replace('calle:','')}]` : '';
              try {
                new Notification(`💬 ${m.autorNombre||'Vecino'}${canal}`, {
                  body: (m.texto||'').substring(0, 100),
                  icon: './icon.svg',
                  badge: './icon.svg',
                  tag: `chat-${m.id}`,
                  data: { url: '#chat' },
                });
              } catch(e) {}
            });
        }

        if(S.tab==='chat') {
          // Si el chat ya está montado, actualizar solo mensajes (preserva foco del input)
          if (q('#chat-msgs-container')) {
            const el = q('#chat-list');
            const eraFinal = el ? el.scrollHeight - el.scrollTop - el.clientHeight < 80 : true;
            updateChatUI(eraFinal);
          } else {
            re();
            setTimeout(scrollChat, 100);
          }
          setTimeout(marcarLeidos, 1200);
        }
      })
  );
  S.unsubs.push(
    db.collection('config').doc('app')
      .onSnapshot(snap => { if(snap.exists) S.cfg={...S.cfg,...snap.data()}; })
  );
  S.unsubs.push(
    // limit(300): tope de seguridad para que el snapshot no crezca indefinidamente.
    // Con fotos de perfil a 120 px ≈ 3-6 KB c/u, 300 vecinos pesan ~1-2 MB.
    // Si la colonia supera 300 vecinos en el futuro, considerar paginar el directorio.
    db.collection('users').limit(300)
      .onSnapshot(snap => {
        // Ordenar client-side evita necesidad de índice en Firestore
        const todos = snap.docs.map(d=>({uid:d.id,...d.data()}));
        todos.sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||'','es'));
        // Deduplicar por uid por si acaso
        S.usuarios = [...new Map(todos.map(u=>[u.uid,u])).values()];
        if(S.tab==='vecinos') re();
      })
  );
  S.unsubs.push(
    db.collection('users').doc(S.user.uid)
      .onSnapshot(snap => {
        if(snap.exists){ S.perfil={uid:S.user.uid,...snap.data()}; if(!S.det) re(); }
      })
  );
  // Liberar guard para permitir re-suscripción futura si es necesario
  setTimeout(() => { S._suscribiendo = false; }, 500);

  // Reportes — solo para admins
  if (['admin','programador'].includes(S.perfil?.rol?.toLowerCase())) {
    S.unsubs.push(
      db.collection('reportes').where('resuelto','==',false).orderBy('fecha','desc').limit(30)
        .onSnapshot(snap => {
          S.reportes = snap.docs.map(d=>({id:d.id,...d.data()}));
          if(S.tab==='admin') re();
        })
    );
    S.unsubs.push(
      db.collection('users').where('pendiente','==',true)
        .onSnapshot(snap => {
          S.pendientes = snap.docs.map(d=>({uid:d.id,...d.data()}));
          if(S.tab==='admin') re();
        })
    );
    // Limpiar noticias expiradas al entrar como admin
    setTimeout(adminLimpiarExpiradas, 2000);
  }
}

/* ── Reacciones (toggle) — actualización optimista para respuesta inmediata ── */
async function reaccionar(noticiaId, emoji) {
  const uid = S.user.uid;
  const not = [...S.nots, ...S.notsMas].find(n => n.id === noticiaId);
  if (!not) return;
  const actual = (not.reacciones || {})[uid];
  const quitar = actual === emoji;

  // 1. Actualizar estado local inmediatamente (UI responde al instante)
  const reaccionesOpt = { ...(not.reacciones || {}) };
  if (quitar) {
    delete reaccionesOpt[uid];
  } else {
    reaccionesOpt[uid] = emoji;
  }
  const actualizarLista = arr => arr.map(n =>
    n.id === noticiaId ? { ...n, reacciones: reaccionesOpt } : n
  );
  S.nots    = actualizarLista(S.nots);
  S.notsMas = actualizarLista(S.notsMas);
  render(); // render inmediato — sin esperar a Firestore

  // 2. Persistir en Firestore en segundo plano
  try {
    if (quitar) {
      await db.collection('noticias').doc(noticiaId)
        .update({ [`reacciones.${uid}`]: firebase.firestore.FieldValue.delete() });
    } else {
      await db.collection('noticias').doc(noticiaId)
        .update({ [`reacciones.${uid}`]: emoji });
    }
  } catch(e) {
    // Revertir si falla la escritura
    const reaccionesRevert = { ...(not.reacciones || {}) };
    const revertir = arr => arr.map(n =>
      n.id === noticiaId ? { ...n, reacciones: reaccionesRevert } : n
    );
    S.nots    = revertir(S.nots);
    S.notsMas = revertir(S.notsMas);
    render();
    throw e;
  }
}

/* ── Firebase Cloud Messaging ── */
async function initFCM() {
  if (!('Notification' in window) || !('serviceWorker' in navigator) || !CONFIG_OK) return;
  try {
    const messaging = firebase.messaging();
    // Mensaje en foreground (app abierta)
    messaging.onMessage(payload => {
      const n = payload.notification || {};
      try { new Notification(n.title || 'Mi Colonia', { body: n.body, icon: './icon.svg', badge: './icon.svg' }); } catch(e){}
      toast(`🔔 ${n.title || 'Nueva notificación'}`);
    });
    // Si el permiso ya está concedido, registrar SW explícitamente y obtener token
    if (Notification.permission === 'granted' && VAPID_KEY !== 'TU_VAPID_KEY_AQUI') {
      // Firebase Messaging necesita que el SW esté registrado antes de getToken
      const swReg = await navigator.serviceWorker.register('./firebase-messaging-sw.js');
      await navigator.serviceWorker.ready; // esperar a que esté activo
      const token = await messaging.getToken({ vapidKey: VAPID_KEY, serviceWorkerRegistration: swReg });
      if (token && S.user) {
        S.fcmToken = token;
        await db.collection('users').doc(S.user.uid).update({ fcmToken: token });
      }
    }
  } catch(e) { console.log('FCM no disponible:', e.message); }
}

/* ── Solicitar permiso de notificaciones ── */
async function pedirPermiso() {
  if (!('Notification' in window)) { toast('Tu navegador no soporta notificaciones'); return; }
  if (!('serviceWorker' in navigator)) { toast('Tu navegador no soporta notificaciones push'); return; }
  const perm = await Notification.requestPermission();
  S.notifPerm = perm;
  if (perm === 'granted') {
    toast('🔔 ¡Notificaciones activadas!');
    await initFCM();
  } else {
    toast('Notificaciones desactivadas');
  }
  render();
}

async function guardarCfg(nombre, mapUrl, codigoEventos) {
  // Si el campo llega vacío no tocamos el hash existente en Firestore.
  // Solo actualizamos codigoEventos cuando el admin escribe un código nuevo.
  const datos = { nombre, mapUrl };
  if (codigoEventos) {
    // El código se guarda como hash SHA-256 — nunca en texto plano
    datos.codigoEventos = await sha256(codigoEventos.trim().toUpperCase());
  }
  await db.collection('config').doc('app').set(datos, { merge: true });

  S.cfg = { ...S.cfg, nombre, mapUrl };
}

/* ── Días restantes hasta expiración de una noticia ── */
function diasRestantes(expiresAt) {
  if (!expiresAt) return null;
  const exp = expiresAt.toDate ? expiresAt.toDate() : new Date(expiresAt);
  const diff = exp - Date.now();
  if (diff <= 0) return 0;
  return Math.ceil(diff / (1000 * 60 * 60 * 24));
}

/* ── Marcar mensajes como leídos (batch Firestore) ── */
async function marcarLeidos() {
  if (!S.user || S.tab !== 'chat') return;
  const uid = S.user.uid;
  const todos = [...S.chatAntes, ...S.chat].filter(m =>
    (S.canalChat === 'general' ? (!m.canal || m.canal === 'general') : m.canal === S.canalChat) &&
    m.autorId !== uid && !S.chatLeidos.has(m.id) && !m.leido?.[uid]
  );
  if (todos.length === 0) return;
  const MAX_WRITES = 5;
  const aEscribir = todos.slice(-MAX_WRITES);
  todos.forEach(m => S.chatLeidos.add(m.id));
  try {
    const batch = db.batch();
    aEscribir.forEach(m => { batch.update(db.collection('chat').doc(m.id), { [`leido.${uid}`]: firebase.firestore.FieldValue.serverTimestamp() }); });
    await batch.commit();
  } catch(e) { console.log('Error marcando leído:', e.message); }
}

/* ── Reportar un mensaje o noticia ── */
async function reportarMsg(msgId, msgTexto, msgAutorId, msgAutorNombre, canal, motivo, tipo='chat') {
  await db.collection('reportes').add({
    msgId, msgTexto: (msgTexto||'').substring(0,300),
    msgAutorId, msgAutorNombre,
    canal: canal || 'general',
    tipo,                  // 'chat' | 'noticia'
    reportadoPorId: S.user.uid,
    reportadoPorNombre: S.perfil.nombre,
    motivo,
    resuelto: false,
    fecha: firebase.firestore.FieldValue.serverTimestamp(),
  });
}

/* ── Aprobar vecino pendiente (admin) ── */
async function aprobarVecino(uid) {
  await db.collection('users').doc(uid).update({ pendiente: false });
}

/* ── Limpiar noticias expiradas (solo admins) ── */
async function adminLimpiarExpiradas() {
  try {
    const ahora = firebase.firestore.Timestamp.now();
    const snap = await db.collection('noticias').where('expiresAt', '<=', ahora).get();
    if (snap.empty) return;
    const batch = db.batch();
    snap.docs.forEach(d => batch.delete(d.ref));
    await batch.commit();
    console.log(`✅ ${snap.docs.length} noticias expiradas eliminadas`);
  } catch(e) { console.log('adminLimpiarExpiradas:', e.message); }
}

/* ══════════════════════════════════════════════════════
   ⑦ NAVEGACIÓN — History API
   Permite: botón atrás nativo, persistir tab al refrescar
══════════════════════════════════════════════════════ */
function encodeHash() {
  if (S.pant === 'perfil') return 'perfil';
  if (S.det) return `${S.tab}/det/${S.det.tipo}/${S.det.id}`;
  return S.tab || 'noticias';
}
function applyHash(hash) {
  if (!hash) hash = 'noticias';
  if (hash === 'perfil') {
    S.pant = 'perfil'; S.det = null; S.modEditP = false; return;
  }
  const parts = hash.split('/');
  S.tab = parts[0] || 'noticias';
  S.pant = 'app';
  if (parts.length === 4 && parts[1] === 'det') {
    S.det = { tipo: parts[2], id: parts[3] };
    if (parts[2] === 'not') suscribirComentarios(parts[3]);
    else if (S.comentUnsub) { S.comentUnsub(); S.comentUnsub = null; }
  } else {
    S.det = null;
    if (S.comentUnsub) { S.comentUnsub(); S.comentUnsub = null; }
  }
  S.modCrNot = false; S.modCrEvt = false; S.modCodigo = false;
}
function navPush(tab, det, pant) {
  if (tab  !== undefined) S.tab  = tab;
  if (det  !== undefined) {
    if (det?.tipo === 'not') suscribirComentarios(det.id);
    else if (S.comentUnsub) { S.comentUnsub(); S.comentUnsub = null; }
    S.det = det;
  }
  if (pant !== undefined) S.pant = pant;
  const hash = encodeHash();
  history.pushState({ hash }, '', '#' + hash);
  render();
}
function navBack() { history.back(); }

window.addEventListener('popstate', e => {
  if (['auth','setup','cargando'].includes(S.pant)) return;
  const hash = e.state?.hash || location.hash.slice(1) || 'noticias';
  applyHash(hash);
  render();
});

/* ══════════════════════════════════════════════════════
   ⑦ RENDER — PANTALLAS
══════════════════════════════════════════════════════ */
function render() {
  const root = q('#root');
  if (S.pant==='cargando') { root.innerHTML = renderCargando(); return; }
  if (S.pant==='setup')    { root.innerHTML = renderSetup(); bind(); return; }
  if (S.pant==='auth')     { root.innerHTML = renderAuth(); bind(); return; }
  if (S.pant==='perfil')   { root.innerHTML = renderPerfil(); bind(); return; }
  if (S.det)               { root.innerHTML = renderDetalle(); bind(); return; }
  root.innerHTML = hdrHTML() + renderPendingBanner() + renderTab() + navHTML() + renderModals() + renderFAB() + renderPWABtn();

}

function renderNotsCards() {
  const idsEnVivo = new Set(S.nots.map(n=>n.id));
  const sinDup = S.notsMas.filter(n=>!idsEnVivo.has(n.id));
  const todas = [...S.nots, ...sinDup];

  // Filtro por tipo y búsqueda
  const q2 = S.busqNot.toLowerCase().trim();
  const lista = todas.filter(p => {
    const tipoOk = S.filtro==='todos' || p.tipo===S.filtro;
    const busqOk = !q2 || (p.titulo||'').toLowerCase().includes(q2) || (p.texto||'').toLowerCase().includes(q2);
    return tipoOk && busqOk;
  });

  if (lista.length === 0) {
    return `<div class="empty"><div class="empty-ico">${q2 ? '🔍' : '📭'}</div><div class="empty-txt">${q2 ? `Sin resultados para "<strong>${q2}</strong>"` : 'Sin publicaciones todavía.'}</div></div>`;
  }
  return lista.map(p=>{
        const miniAv = p.autorFoto
          ? `<div class="mini-av" style="background-image:url('${p.autorFoto}')"></div>`
          : `<div class="mini-av">${(p.autorNombre||'?').charAt(0)}</div>`;
        const dias = diasRestantes(p.expiresAt);
        const expBadge = dias !== null && dias <= 4
          ? `<span class="badge ${dias <= 1 ? 'b-exp-pronto' : 'b-exp'}">⏳ ${dias <= 0 ? 'Expira hoy' : dias === 1 ? 'Expira mañana' : `${dias} días restantes`}</span>`
          : '';
        const pct14 = dias !== null ? Math.max(0, Math.min(100, (dias / 14) * 100)) : 100;
        const expBar = p.expiresAt ? `<div class="exp-bar"><div class="exp-fill ${dias !== null && dias <= 3 ? 'roja' : ''}" style="width:${pct14}%"></div></div>` : '';
        return `<div class="card" data-nid="${p.id}">
          ${p.fotoUrl ? `<img src="${p.fotoUrl}" class="not-img" loading="lazy">` : ''}
          <div class="card-body">${badge(p.tipo,p.urgente)}${expBadge}
            <div class="card-title">${escHTML(p.titulo)}</div>
            <div class="card-excerpt">${escHTML(p.texto)}</div>
          </div>
          ${pollBarsCard(p)}
          <div class="card-meta"><div class="card-meta-l">${miniAv}<span>${escHTML(p.autorNombre||'')}</span></div><div style="display:flex;align-items:center;gap:.6rem">${(p.numComentarios||0)>0?`<span>💬 ${p.numComentarios}</span>`:''}<span>${ago(p.fecha)}</span></div></div>
          ${expBar}
        </div>`;
      }).join('');
}

/* Cards filtradas de vecinos — función separada para no destruir el input al buscar */
function renderVecsCards() {
  const miCalle = S.perfil?.calle || '';
  const q2 = S.busqVec.toLowerCase().trim();

  let lista = S.filtroVec === 'micalle'
    ? S.usuarios.filter(u => u.calle && u.calle === miCalle)
    : S.usuarios;

  if (q2) {
    lista = lista.filter(u =>
      (u.nombre||'').toLowerCase().includes(q2) ||
      (u.calle||'').toLowerCase().includes(q2)
    );
  }

  if (lista.length === 0) {
    return `<div class="empty"><div class="empty-ico">${q2 ? '🔍' : '👥'}</div><div class="empty-txt">${
      q2 ? `Sin vecinos que coincidan con "<strong>${q2}</strong>"`
        : S.filtroVec === 'micalle'
          ? `No hay otros vecinos registrados en<br><strong style="color:var(--txt)">${miCalle || 'tu calle'}</strong>.`
          : 'Aún no hay vecinos registrados.'
    }</div></div>`;
  }
  return lista.map(v => {
      const av = v.fotoUrl
        ? `<div style="width:44px;height:44px;border-radius:50%;background-image:url('${v.fotoUrl}');background-size:cover;background-position:center;flex-shrink:0"></div>`
        : `<div class="vec-av" style="font-size:.95rem;font-weight:800;color:var(--pri)">${(v.nombre||'?').charAt(0).toUpperCase()}</div>`;
      const esTu = v.uid === S.user?.uid;
      return `<div class="vec-card">
        ${av}
        <div style="flex:1;min-width:0">
          <div style="font-size:.92rem;font-weight:700">${escHTML(v.nombre||'Sin nombre')}${esTu ? ' <span style="font-size:.65rem;background:var(--pri-x);color:var(--pri);padding:1px 7px;border-radius:100px;font-weight:700">Tú</span>' : ''}</div>
          ${v.calle ? `<div style="font-size:.75rem;color:var(--txt2);margin-top:2px">📍 ${escHTML(v.calle)}</div>` : ''}
        </div>
      </div>`;
    }).join('');
}

/* ─── Render solo la lista de mensajes del chat (sin tocar el input ni la barra) ─── */
function renderChatMsgs() {
  const uid = S.user?.uid;
  const idsVivos = new Set(S.chat.map(m=>m.id));
  const antesOk  = S.chatAntes.filter(m=>!idsVivos.has(m.id));
  const todosChat = [...antesOk, ...S.chat];
  const filtrados = todosChat.filter(m =>
    S.canalChat === 'general'
      ? (!m.canal || m.canal === 'general')
      : m.canal === S.canalChat
  );
  const loadMoreBtn = S.chatHayMas || S.chatAntes.length > 0
    ? `<div style="text-align:center;padding:.5rem 0 .25rem">
        <button class="btn-load-more" id="btn-load-chat" ${S.chatCargando?'disabled':''} style="width:auto;padding:.4rem 1.2rem;font-size:.78rem">
          ${S.chatCargando ? '<span class="spin">⏳</span> Cargando...' : '⬆️ Ver mensajes anteriores'}
        </button>
      </div>` : '';
  if (filtrados.length === 0)
    return loadMoreBtn + `<div class="empty" style="padding:2rem 0"><div class="empty-ico">${misCanales().find(c=>c.k===S.canalChat)?.i||'💬'}</div><div class="empty-txt">Sin mensajes en este canal todavía.<br>¡Sé el primero!</div></div>`;
  const msgs = filtrados.map(m => {
    const mine = m.autorId === uid;
    const esPriv = ['admin','programador'].includes(S.perfil?.rol?.trim().toLowerCase());
    const puedeEditar = mine; const puedeBorrar = mine || esPriv; const puedeReportar = !mine;
    const usuarioCacheado = S.usuarios.find(u => u.uid === m.autorId);
    const fotoActual = usuarioCacheado?.fotoUrl ?? m.autorFoto ?? '';
    const av = fotoActual
      ? `<div class="msg-av" style="background-image:url('${fotoActual}')"></div>`
      : `<div class="msg-av">${(m.autorNombre||'?').charAt(0)}</div>`;
    const editando = S.editMsgId === m.id;
    const lectores = mine ? Object.keys(m.leido || {}).filter(k=>k!==uid).length : 0;
    const ticksHTML = mine ? lectores > 0 ? `<span class="ticks leido">✓✓</span>` : m.timestamp ? `<span class="ticks enviado">✓</span>` : '' : '';
    const accBtns = [
      puedeEditar ? `<button class="msg-btn-acc" data-edit-msg="${m.id}" data-edit-txt="${escHTML(m.texto||'')}">✏️</button>` : '',
      puedeBorrar ? `<button class="msg-btn-acc" data-del-msg="${m.id}">🗑️</button>` : '',
      puedeReportar ? `<button class="msg-btn-acc" title="Reportar" data-report-msg="${m.id}" data-report-autor="${escHTML(m.autorId||'')}" data-report-nombre="${escHTML(m.autorNombre||'')}" data-report-txt="${escHTML((m.texto||'').substring(0,200))}" data-report-canal="${escHTML(m.canal||'general')}">🚩</button>` : '',
    ].filter(Boolean).join('');
    const accMsg = accBtns ? `<div class="msg-acc">${accBtns}</div>` : '';
    const burbuja = editando
      ? `<div class="msg-bub" style="min-width:180px">
           <textarea id="edit-msg-inp" style="min-height:60px;margin-bottom:6px">${escHTML(m.texto)}</textarea>
           <div style="display:flex;gap:6px">
             <button class="btn-pri" style="flex:1;padding:.3rem" id="btn-save-msg">Guardar</button>
             <button class="btn-out" style="flex:1;padding:.3rem" id="btn-cancel-msg">✕</button>
           </div>
         </div>`
      : `<div class="msg-bub">
           ${!mine?`<div class="msg-nick">${escHTML(m.autorNombre)}</div>`:''}
           <div class="msg-txt">${escNL(m.texto)}</div>
           <div class="msg-ts">${m.editado ? `editado · ` : ''}${ago(m.timestamp)}${ticksHTML}</div>
         </div>`;
    return `<div class="msg ${mine?'mine':''}" data-msg-id="${m.id}">
      ${!mine?av:''}${burbuja}${mine?av:''}${accMsg}
    </div>`;
  }).join('');
  return loadMoreBtn + msgs;
}

/* ─── Actualiza solo los mensajes del chat sin destruir el input ─── */
function updateChatUI(scrollToBottom = false) {
  const container = q('#chat-msgs-container');
  if (!container) { render(); return; }
  // Guardar qué mensajes ya están en pantalla para no re-animarlos
  const idsVisibles = new Set(
    [...container.querySelectorAll('.msg[data-msg-id]')].map(el => el.dataset.msgId)
  );
  // Preservar valor del input si el usuario estaba escribiendo
  const inp = q('#chat-inp');
  const valAntes = inp?.value || '';
  const hasFocus = document.activeElement === inp;
  container.innerHTML = renderChatMsgs();
  // Suprimir animación en mensajes que ya estaban — solo los nuevos animan
  if (idsVisibles.size > 0) {
    container.querySelectorAll('.msg[data-msg-id]').forEach(el => {
      if (idsVisibles.has(el.dataset.msgId)) el.classList.add('no-anim');
    });
  }
  bindChatEvents();
  q('#btn-load-chat')?.addEventListener('click', () => cargarMasChat());
  if (valAntes && inp) { inp.value = valAntes; inp.setSelectionRange(valAntes.length, valAntes.length); }
  if (hasFocus && inp) inp.focus();
  if (scrollToBottom) setTimeout(scrollChat, 80);
}

/* ─── Re-bind solo eventos dentro de la lista de mensajes ─── */
function bindChatEvents() {
  qA('[data-del-msg]').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    confirmar('¿Eliminar este mensaje?').then(ok => { if(ok) borrarMsg(b.dataset.delMsg).then(()=>toast('🗑️ Mensaje eliminado')); });
  }));
  qA('[data-edit-msg]').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    S.editMsgId = S.editMsgId===b.dataset.editMsg ? null : b.dataset.editMsg;
    S.editMsgTxt = b.dataset.editTxt||'';
    updateChatUI(); setTimeout(scrollChat,80);
  }));
  q('#btn-save-msg')?.addEventListener('click',async()=>{
    const txt=q('#edit-msg-inp')?.value.trim();
    if(!txt){ toast('⚠️ El mensaje no puede estar vacío'); return; }
    await editarMsg(S.editMsgId, txt);
    S.editMsgId=null; toast('✅ Mensaje editado');
  });
  q('#btn-cancel-msg')?.addEventListener('click',()=>{ S.editMsgId=null; updateChatUI(); });
  qA('[data-report-msg]').forEach(b => b.addEventListener('click', e => {
    e.stopPropagation();
    S.reporteMsgId  = b.dataset.reportMsg;
    S.reporteMsgData = { txt: b.dataset.reportTxt, nombre: b.dataset.reportNombre, canal: b.dataset.reportCanal, autorId: b.dataset.reportAutor };
    S.reporteMotivo = 'spam';
    S.modReporte = true;
    render();
  }));
}

function actualizarBannerConexion() {
  const banner = document.getElementById('offline-banner');
  if (!banner) return;
  if (navigator.onLine) {
    banner.classList.remove('visible');
  } else {
    banner.classList.add('visible');
  }
}

function updateChatCounter(val) {
  const counter = q('#chat-counter');
  if (!counter) return;
  const rem = MAX_CHAT - (val||'').length;
  if (rem > 100) { counter.style.display = 'none'; return; }
  counter.style.display = '';
  counter.textContent = rem;
  counter.className = 'chat-counter' + (rem < 0 ? ' over' : rem < 50 ? ' warn' : '');
}

/* ─── bindCards — re-asocia clicks en cards sin re-renderizar inputs ─── */
function bindCards() {
  qA('[data-nid]').forEach(c => c.addEventListener('click', () => { navPush(undefined, {tipo:'not', id:c.dataset.nid}); }));
  qA('[data-eid]').forEach(c => c.addEventListener('click', () => { navPush(undefined, {tipo:'evt', id:c.dataset.eid}); }));
}

/* ══════════════════════════════════════════════════════
   ⑧ BIND EVENTS
══════════════════════════════════════════════════════ */
function bind() {
  /* PWA INSTALL */
  q('#pwa-install-btn')?.addEventListener('click', async e => {
    if (e.target.id === 'pwa-dismiss' || e.target.closest('#pwa-dismiss')) return;
    if (!S.pwaPrompt) return;
    S.pwaPrompt.prompt();
    const { outcome } = await S.pwaPrompt.userChoice;
    S.pwaPrompt = null;
    if (outcome === 'accepted') toast('✅ ¡App instalada!');
    render();
  });
  q('#pwa-dismiss')?.addEventListener('click', e => {
    e.stopPropagation();
    S.pwaDismissed = true;
    render();
  });

  /* NAV */
  qA('[data-tab]').forEach(b=>b.addEventListener('click',()=>{
    navPush(b.dataset.tab, null, 'app');
    if (b.dataset.tab === 'chat') setTimeout(marcarLeidos, 1200);
  }));
  qA('[data-f]').forEach(b=>b.addEventListener('click',()=>{
    S.filtro=b.dataset.f;
    // Si hay buscador activo, solo actualizar las cards (no destruir el input)
    const container = q('#nots-cards-container');
    if (container) {
      container.innerHTML = renderNotsCards();
      // Actualizar estilo de los tabs sin re-renderizar
      qA('[data-f]').forEach(x => x.classList.toggle('on', x.dataset.f === S.filtro));
      bindCards();
    } else {
      render();
    }
  }));
  qA('[data-fv]').forEach(b=>b.addEventListener('click',()=>{
    S.filtroVec=b.dataset.fv;
    const container = q('#vecs-cards-container');
    if (container) {
      container.innerHTML = renderVecsCards();
      qA('[data-fv]').forEach(x => x.classList.toggle('on', x.dataset.fv === S.filtroVec));
      bindCards();
    } else {
      render();
    }
  }));
  qA('[data-canal]').forEach(b=>b.addEventListener('click',()=>{
    S.canalChat=b.dataset.canal;
    S.chatLeidos = new Set(); // reset on canal switch
    S.chatAntes = []; S.chatHayMas = S.chat.length >= 50; // limpiar historial paginado al cambiar canal
    render(); setTimeout(scrollChat,80);
    setTimeout(marcarLeidos, 1200);
  }));

  /* BÚSQUEDA — noticias (actualiza solo las cards, no destruye el input) */
  const inpNot = q('#inp-busq-not');
  if (inpNot) {
    inpNot.addEventListener('input', e => {
      S.busqNot = e.target.value;
      // Actualizar solo el contenedor de cards y el botón clear, sin tocar el input
      const container = q('#nots-cards-container');
      const clearWrap = q('#not-clear-wrap');
      if (container) container.innerHTML = renderNotsCards();
      if (clearWrap) clearWrap.innerHTML = S.busqNot
        ? `<button class="search-clear" id="btn-clear-not">✕</button>`
        : `<span class="search-ico">🔍</span>`;
      // Re-bind solo lo que cambió
      q('#btn-clear-not')?.addEventListener('click', () => { S.busqNot = ''; inpNot.value = ''; if(container) container.innerHTML = renderNotsCards(); if(clearWrap) clearWrap.innerHTML = `<span class="search-ico">🔍</span>`; bindCards(); });
      bindCards();
    });
  }
  q('#btn-clear-not')?.addEventListener('click', () => {
    S.busqNot = '';
    const inpN = q('#inp-busq-not'); if(inpN) inpN.value = '';
    const container = q('#nots-cards-container');
    const clearWrap = q('#not-clear-wrap');
    if (container) container.innerHTML = renderNotsCards();
    if (clearWrap) clearWrap.innerHTML = `<span class="search-ico">🔍</span>`;
    bindCards();
  });

  /* BÚSQUEDA — vecinos (igual: solo repinta cards) */
  const inpVec = q('#inp-busq-vec');
  if (inpVec) {
    inpVec.addEventListener('input', e => {
      S.busqVec = e.target.value;
      const container = q('#vecs-cards-container');
      const clearWrap = q('#vec-clear-wrap');
      if (container) container.innerHTML = renderVecsCards();
      if (clearWrap) clearWrap.innerHTML = S.busqVec
        ? `<button class="search-clear" id="btn-clear-vec">✕</button>`
        : `<span class="search-ico">🔍</span>`;
      q('#btn-clear-vec')?.addEventListener('click', () => { S.busqVec = ''; inpVec.value = ''; if(container) container.innerHTML = renderVecsCards(); if(clearWrap) clearWrap.innerHTML = `<span class="search-ico">🔍</span>`; bindCards(); });
      bindCards();
    });
  }
  q('#btn-clear-vec')?.addEventListener('click', () => {
    S.busqVec = '';
    const inpV = q('#inp-busq-vec'); if(inpV) inpV.value = '';
    const container = q('#vecs-cards-container');
    const clearWrap = q('#vec-clear-wrap');
    if (container) container.innerHTML = renderVecsCards();
    if (clearWrap) clearWrap.innerHTML = `<span class="search-ico">🔍</span>`;
    bindCards();
  });

  /* CARGAR MÁS */
  q('#btn-load-nots')?.addEventListener('click', () => cargarMasNots());
  q('#btn-load-chat')?.addEventListener('click', () => cargarMasChat());

  /* NOTIFICACIONES — banner */
  q('#btn-pedir-permiso')?.addEventListener('click', () => pedirPermiso());
  q('#btn-dismiss-notif')?.addEventListener('click', () => {
    S.notifBannerDismissed = true;
    try { localStorage.setItem('notifDismissed', '1'); } catch(_) {}
    render();
  });

  /* REPORTE — abrir modal */
  qA('[data-report-msg]').forEach(b => b.addEventListener('click', e => {
    e.stopPropagation();
    S.reporteMsgId  = b.dataset.reportMsg;
    S.reporteMsgData = { txt: b.dataset.reportTxt, nombre: b.dataset.reportNombre, canal: b.dataset.reportCanal, autorId: b.dataset.reportAutor };
    S.reporteMotivo = 'spam';
    S.modReporte = true;
    render();
  }));

  /* REPORTE — seleccionar motivo */
  qA('[data-motivo]').forEach(b => b.addEventListener('click', () => {
    S.reporteMotivo = b.dataset.motivo;
    qA('[data-motivo]').forEach(x => x.className = 'tbtn');
    b.className = 'tbtn sa';
  }));

  /* REPORTE — desde detalle de noticia */
  q('#btn-report-not')?.addEventListener('click', () => {
    const p = S.nots.find(x => x.id === S.det?.id);
    if (!p) return;
    S.reporteMsgId   = p.id;
    S.reporteMsgData = {
      txt: `${p.titulo}: ${p.texto}`,
      nombre: p.autorNombre,
      canal: 'noticias',
      autorId: p.autorId,
      tipo: 'noticia',
    };
    S.reporteMotivo = 'spam';
    S.modReporte = true;
    render();
  });

  /* REPORTE — confirmar */
  q('#btn-confirm-reporte')?.addEventListener('click', async () => {
    if (!S.reporteMsgId) return;
    S.carg = true; render();
    try {
      await reportarMsg(
        S.reporteMsgId,
        S.reporteMsgData?.txt || '',
        S.reporteMsgData?.autorId || '',
        S.reporteMsgData?.nombre || '',
        S.reporteMsgData?.canal || 'general',

q('#foto-inp').addEventListener('change',async e=>{
  const file=e.target.files[0]; if(!file) return;
  S.fotoFile=file;
  const reader=new FileReader();
  reader.onload=async ev=>{
    S.fotoPrev=ev.target.result;
    if(S.fotoCtx==='perfil' && !S.modEditP){
      try{
        toast('⏳ Subiendo foto...');
        const fotoUrl=await fotoABase64(S.fotoFile);
        await db.collection('users').doc(S.user.uid).update({fotoUrl});
        S.perfil={...S.perfil,fotoUrl};
        S.fotoFile=null; S.fotoPrev=null;
        toast('✅ Foto actualizada');
      }catch(err){ toast('Error al guardar foto'); }
    } else if(S.fotoCtx==='crnot'){
      try{
        toast('⏳ Procesando foto...');
        S.fotoCrNot = await fotoNoticiaABase64(S.fotoFile);
        toast('✅ Foto lista');
      }catch(err){ toast('Error al procesar foto'); }
      S.fotoFile=null; S.fotoPrev=null;
    } else if(S.fotoCtx==='crevt'){
      try{
        toast('⏳ Procesando foto...');
        S.fotoCrEvt = await fotoNoticiaABase64(S.fotoFile);
        toast('✅ Foto lista');
      }catch(err){ toast('Error al procesar foto'); }
      S.fotoFile=null; S.fotoPrev=null;
    }
    // Guardar valores del formulario antes de re-renderizar
    const _nomEvt=q('#inp-etit')?.value||'', _fecEvt=q('#inp-efec')?.value||'', _descEvt=q('#inp-edesc')?.value||'';
    const _nomNot=q('#inp-tit')?.value||'', _txtNot=q('#inp-txt')?.value||'';
    render();
    // Restaurar después del render
    if(_nomEvt&&q('#inp-etit')) q('#inp-etit').value=_nomEvt;
    if(_fecEvt&&q('#inp-efec')) q('#inp-efec').value=_fecEvt;
    if(_descEvt&&q('#inp-edesc')) q('#inp-edesc').value=_descEvt;
    if(_nomNot&&q('#inp-tit')) q('#inp-tit').value=_nomNot;
    if(_txtNot&&q('#inp-txt')) q('#inp-txt').value=_txtNot;
  };
  reader.readAsDataURL(file);
  e.target.value='';
});

/* ══════════════════════════════════════════════════════
   ⑩ INIT — auth state observer
══════════════════════════════════════════════════════ */
if (!CONFIG_OK) {
  S.pant='setup'; render();
} else {
  auth.onAuthStateChanged(async user => {
    if (user) {
      S.user=user;

      // ── Leer rol desde Custom Claim del token JWT (sin lectura extra a Firestore)
      // Si el claim no existe aún (vecinos sin claim), cae al valor del doc de Firestore.
      let rolFromToken = null;
      try {
        const tokenResult = await user.getIdTokenResult();
        if (tokenResult.claims.rol) rolFromToken = tokenResult.claims.rol;
      } catch(_) {}

      const doc=await db.collection('users').doc(user.uid).get();
      if(doc.exists){
        const dataPerfil = doc.data();
        // El claim del token tiene prioridad sobre el campo rol de Firestore
        if (rolFromToken) dataPerfil.rol = rolFromToken;
        S.perfil={uid:user.uid,...dataPerfil};
        S.pant='app';
        // Restaurar tab del hash (persiste al refrescar)
        const savedHash = location.hash.slice(1);
        if (savedHash && !savedHash.includes('/det/') && savedHash !== 'perfil') {
          S.tab = savedHash;
        }
        history.replaceState({ hash: encodeHash() }, '', '#' + encodeHash());
        suscribir();
        initFCM();
      } else {
        // Si estamos en medio de un registro, esperar a que termine
        // (race condition: Auth se crea antes que el doc de Firestore)
        if (S._registrando) return;

        // Usuario en Auth pero sin perfil en Firestore (registro a medias)
        // Intentar eliminar el usuario huérfano de Auth para liberar el correo
        try {
          await user.delete();
          toast('⚠️ Registro incompleto. Por favor crea tu cuenta de nuevo.');
        } catch(e) {
          // Si delete() falla (requiere re-autenticación reciente), solo cerrar sesión
          await auth.signOut();
          toast('⚠️ Cuenta sin perfil. Escribe a tu administrador o intenta con otro correo.');
        }
      }
    } else {
      S.user=null; S.perfil=null; S.pant='auth';
      S.nots=[]; S.notsMas=[]; S.notLastDoc=null; S.notHayMas=false;
      S.chat=[]; S.chatAntes=[]; S.chatFirstDoc=null; S.chatHayMas=false;
      S.busqNot=''; S.busqVec=''; S._firstLoad=true;
      S.chatLeidos=new Set(); S.reportes=[]; S.pendientes=[];
      S.comentarios={}; S.fotoCrNot=null; S.fotoCrEvt=null;
      S.unsubs.forEach(u=>u()); S.unsubs=[];
    }
    S.carg=false; render();
  });
}

if('serviceWorker' in navigator)
  navigator.serviceWorker.register('./sw.js').catch(()=>{});

/* ─── Clic en notificación del sistema → navegar a la sección correcta ─── */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data?.url) { location.hash = e.data.url.replace('#',''); render(); }
  });
}
// Notificaciones locales (Notification API directa) — navegar al clic
if ('Notification' in window) {
  navigator.serviceWorker?.ready.then(sw => {
    sw.getNotifications?.().catch(()=>{});
  }).catch(()=>{});
}

/* ─── PWA: capturar evento de instalación ─── */
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  S.pwaPrompt = e;
  render(); // mostrar el botón
});
window.addEventListener('appinstalled', () => {
  S.pwaPrompt = null;
  S.pwaDismissed = true;
  render();
});

/* ─── Restaurar tema guardado ─── */
try { if(localStorage.getItem('tema')==='light') document.body.classList.add('light'); } catch(_){}

/* ─── Conexión: detectar online/offline ─── */
window.addEventListener('online',  () => { actualizarBannerConexion(); toast('🟢 Conexión restaurada'); });

/* ─── Actualizar timestamps (ago) cada 60s mientras la app está abierta ─── */
setInterval(() => {
  if (!['app'].includes(S.pant)) return;
  if (S.det) {
    // Detalle abierto: re-renderizar solo si el usuario no está escribiendo
    // (evita perder el texto del input de comentario o del formulario de edición)
    const activo = document.activeElement?.id;
    const escribiendo = ['com-inp','edit-not-tit','edit-not-txt'].includes(activo);
    if (!escribiendo) render();
  } else {
    // Vista de lista: actualizar solo el contenedor de timestamps visible
    const notsContainer = document.querySelector('#nots-cards-container');
    const chatContainer = document.querySelector('#chat-msgs-container');
    if (notsContainer && S.tab === 'noticias') {
      notsContainer.innerHTML = renderNotsCards();
      bindCards();
    } else if (chatContainer && S.tab === 'chat') {
      updateChatUI(false);
    } else if (!notsContainer && !chatContainer) {
      render();
    }
  }
}, 60000);
window.addEventListener('offline', () => { actualizarBannerConexion(); });
actualizarBannerConexion(); // revisar estado actual al cargar

/* ─── Beforeunload: avisar si hay borrador sin guardar ─── */
window.addEventListener('beforeunload', e => {
  if ((S.modCrNot && hayBorradorNot()) || (S.modCrEvt && hayBorradorEvt())) {
    e.preventDefault();
    e.returnValue = '';
  }
});
</script>
